spring.application.name=Payment_Service

server.port=8084

# look for port 1521, for the instance named "XE"
spring.datasource.url=jdbc:oracle:thin:@localhost:1521:XE

# credentials 
spring.datasource.username=system
spring.datasource.password=root

# acts as a translator between Java and Oracle SQL
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# Object-Relational Mapping
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect

#Syncs Java/DB
spring.jpa.hibernate.ddl-auto=update

#Shows SQL in console.
spring.jpa.show-sql=true

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=payment-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.value.default.type=com.delivery.payment.kafka.OrderEvent