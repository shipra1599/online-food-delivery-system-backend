spring.profiles.active=windows

spring.application.name=Order_Service
server.port=8083

# URL of Menu Service (overridden in application-docker.properties for Docker runs)
menu.service.url=http://localhost:8082

#DATABASE CONNECTIVITY

# look for port 1521, for the instance named "XE"
spring.datasource.url=jdbc:oracle:thin:@localhost:1521:XE

# credentials
spring.datasource.username=system
spring.datasource.password=root

# acts as a translator between Java and Oracle SQL
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# Object-Relational Mapping
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect

#Syncs Java/DB
spring.jpa.hibernate.ddl-auto=update

#Shows SQL in console.
spring.jpa.show-sql=true

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

#CIRCUIT BREAKER

#Looks at the last 10 calls to decide if the service is healthy.
resilience4j.circuitbreaker.instances.menuService.slidingWindowSize=10

#Circuit breaker will only start working after at least 5 calls.
resilience4j.circuitbreaker.instances.menuService.minimumNumberOfCalls=5

#If 50% of the calls fail, the circuit breaker will OPEN i.e.(Stop calling Menu Service).
resilience4j.circuitbreaker.instances.menuService.failureRateThreshold=50

#Once OPEN, wait 10 seconds before trying again.
resilience4j.circuitbreaker.instances.menuService.waitDurationInOpenState=10s

# After 10 seconds, allow 3 test calls.If they succeed,circuit closes (normal flow resumes).If they fail, circuit opens again.
resilience4j.circuitbreaker.instances.menuService.permittedNumberOfCallsInHalfOpenState=3