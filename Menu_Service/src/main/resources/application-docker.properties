# Docker profile: used when the service runs inside a Docker container.

# Inside Docker, "localhost" refers to the container itself.
# To reach the Oracle database running on your Mac, we use host.docker.internal.
spring.datasource.url=jdbc:oracle:thin:@host.docker.internal:1521/XEPDB1

# Database login details
spring.datasource.username=system
spring.datasource.password=root

# Feign client calling Restaurant Service
restaurant.service.url=http://host.docker.internal:8081